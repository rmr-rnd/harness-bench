[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "harness-testing"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "docker>=7.0",
    "rich>=13.0",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "websockets>=12.0",
    "pyyaml>=6.0",
    "click>=8.0",
    "openai>=1.0",
    "httpx>=0.27",
    "asyncpg>=0.29",
    "unidiff>=0.7",
    "odfpy>=1.4",
    "openpyxl>=3.1",
    "pandas>=2.0",
    "mpmath>=1.3",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

# bitgn proto stubs are vendored in vendor/bitgn/ (generated from sample-agents repo)
pac1 = [
    "connect-python>=0.9.0",
    "protobuf>=6.31.1",
]

[project.scripts]
framework = "framework.cli:cli"

[tool.setuptools.packages.find]
where = ["."]
include = ["framework*", "vendor*"]
